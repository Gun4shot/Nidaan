name: medai
description: AI-powered medical assistant app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # HTTP & WebSocket
  dio: ^5.4.0
  web_socket_channel: ^2.4.0

  # UI
  google_fonts: ^6.1.0
  flutter_markdown: ^0.6.18
  lottie: ^3.0.0
  shimmer: ^3.0.0
  animate_do: ^3.3.4
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7
  percent_indicator: ^4.2.3
  flutter_svg: ^2.0.9

  # Storage
  shared_preferences: ^2.2.2
  hive_flutter: ^1.1.0

  # Utils
  intl: ^0.19.0
  uuid: ^4.3.3
  logger: ^2.0.2+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  riverpod_generator: ^2.3.9
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
